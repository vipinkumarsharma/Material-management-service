spring:
  application:
    name: material-management-system
  flyway:
    enabled: false

  # Database Configuration
  datasource:
    url: jdbc:mysql://non-prod-apps-dbs.cxmdwl4djaa6.ap-south-1.rds.amazonaws.com/beejapuri_QA_MM?useSSL=false
    username: vipin_kumar_sharma
    password: 0MtTz8lao9pbAVp
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: MMS-HikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
#      ddl-auto: none # Using Flyway for migrations
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          batch_size: 25
#        order_inserts: false
#        order_updates: true


  # Flyway Configuration
#  flyway:
#    enabled: false
#    baseline-on-migrate: false
#    locations: classpath:db/migration
#    validate-on-migrate: false

  # File Upload Configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# AWS S3 Configuration
aws:
  s3:
    access-key: ${AWS_ACCESS_KEY:your-access-key}
    secret-key: ${AWS_SECRET_KEY:your-secret-key}
    region: ${AWS_REGION:ap-south-1}
    bucket-name: ${AWS_S3_BUCKET:mms-invoices}

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /mms

# Logging Configuration
logging:
  level:
    root: INFO
    com.countrydelight.mms: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    disable-swagger-default-url: true
    use-root-path: false
  show-actuator: true
  default-produces-media-type: application/json
  default-consumes-media-type: application/json

# Management Endpoints - only health exposed
management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /
  endpoint:
    health:
      show-details: never

# DB Risk Guard
db-risk-guard:
  base-dir: ${java.io.tmpdir}/db-risk-guard

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:mysql://localhost:3306/mms_db_dev
    username: root
    password: password

  jpa:
    show-sql: true

logging:
  level:
    com.countrydelight.mms: DEBUG
    org.hibernate.SQL: DEBUG

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    show-sql: false

logging:
  level:
    com.countrydelight.mms: INFO
    org.hibernate.SQL: WARN
